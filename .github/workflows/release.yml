name: Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: version
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS=. read -r major minor patch <<< "$version"
          next_version="${major}.${minor}.$((patch + 1))"

          npm version --no-git-tag-version "$next_version"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"
          echo "asset=neknaj-circuit-game-language-${next_version}.vsix" >> "$GITHUB_OUTPUT"

      - name: Build and package VSIX
        run: |
          npm run build
          npx @vscode/vsce package --no-dependencies --out "${{ steps.version.outputs.asset }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ steps.version.outputs.tag }}"
            exit 0
          fi

          gh release create "${{ steps.version.outputs.tag }}" "${{ steps.version.outputs.asset }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
